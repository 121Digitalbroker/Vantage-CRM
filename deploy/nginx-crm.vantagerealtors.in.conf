server {
    listen 80;
    server_name crm.vantagerealtors.in;

    root /var/www/estatescrm/dist;
    index index.html;

    # Vite/React static assets
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: keep current route working on refresh
    location / {
        try_files $uri $uri/ /index.html;
    }
}
